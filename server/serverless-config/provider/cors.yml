# Esta configuracion no se esta usando ya que genera errores de compilacion
# se esta configurando el cors directamente en el archivo serverless.yml

allowedOrigins:
  - http://localhost:5173
  - http://localhost:3000
  - https://ry3vb22xv3.execute-api.sa-east-1.amazonaws.com

allowedHeaders:
  - Content-Type
  - Authorization
  - X-Amz-Date
  - X-Api-Key
  - X-Amz-Security-Token
  - X-Requested-With

allowedMethods:
  - GET
  - POST
  - PUT
  - PATCH
  - DELETE
  - OPTIONS

allowCredentials: false
maxAge: 3600